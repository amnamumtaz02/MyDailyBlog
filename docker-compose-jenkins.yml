services:
  db-jenkins:
    image: postgres:15
    container_name: blog-db-jenkins
    restart: always
    environment:
      POSTGRES_USER: blogadmin
      POSTGRES_PASSWORD: BlogPass123!
      POSTGRES_DB: blogdb
    volumes:
      - postgres_data_jenkins:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  app-jenkins:
    image: node:20-alpine
    container_name: blog-app-jenkins
    restart: always
    depends_on:
      - db-jenkins
    working_dir: /app
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://blogadmin:BlogPass123!@db-jenkins:5432/blogdb
    command: sh -c "apk add --no-cache openssl && npm install && npx prisma generate && npx prisma db push && npm start"
    ports:
      - "3001:3000"

volumes:
  postgres_data_jenkins:
